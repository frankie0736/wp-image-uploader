version: '3.8'

services:
  wp-image-uploader:
    image: frankie0736/wp-image-uploader:latest
    container_name: wp-image-uploader
    ports:
      - "PORT_PLACEHOLDER:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/domains?token=wp-img-auth-2024-fx-token-9k8j7h6g5f4d3s2a1z"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 